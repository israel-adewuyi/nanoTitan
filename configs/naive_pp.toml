run_name = "naive_pp_demo"

[model]
vocab_size = 50257
d_model = 128
max_seq_len = 128
n_layers = 8
d_head = 16
n_heads = 8
ffn_in = 512

[trainer]
seed = 42
device_id = 3
eval_every_step = -1
per_device_batch_size = 8

[data]
train_tokens_path = "data/preprocessed/tinystories_train.bin"
val_tokens_path = "data/preprocessed/tinystories_val.bin"
num_workers = 4

[optim]
type = "adam"
lr = "1e-3"

[runtime]
name = "naive_pp"

[profiler]
enabled = false
wait_steps = 2
warmup_steps = 2
active_steps = 6
record_shapes = true
profile_memory = true
with_stack = false
with_flops = false
