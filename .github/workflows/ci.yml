name: CI

on: [push, pull_request]

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/ruff-action@v3
        with:
          args: check .

      - uses: astral-sh/ruff-action@v3
        with:
          args: format --check .

  cpu-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          python-version: "3.11"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked --extra cpu --dev --no-install-project

      - name: Run CPU-compatible tests
        run: uv run --no-sync pytest -m "not cuda and not distributed"
